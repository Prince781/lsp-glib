# Vala formatting for lsp-glib. This configuration targets Uncrustify 0.82
# and follows the existing style plus the formatter defaults used by VLS.
#
# Format files with:
#   uncrustify -c .uncrustify.cfg -l VALA --replace --no-backup FILE...

# Files and indentation
newlines                       = lf
nl_end_of_file                 = force
nl_end_of_file_min             = 1
input_tab_size                 = 4
output_tab_size                = 4
indent_columns                 = 4
indent_with_tabs               = 0

indent_namespace               = true
indent_class                   = true
indent_switch_case             = 4
indent_switch_body             = 4
indent_continue                = 4
indent_func_call_param         = true
indent_func_def_param          = true
indent_func_proto_param        = true
indent_paren_close             = 2

# Spacing
sp_arith                       = force
sp_assign                      = force
sp_bool                        = force
sp_compare                     = force
sp_before_sparen               = force
sp_inside_sparen               = remove
sp_before_semi                 = remove
sp_after_semi                  = force
sp_before_comma                = remove
sp_after_comma                 = force
sp_func_call_paren             = force
sp_func_call_paren_empty       = force
sp_func_def_paren              = force
sp_func_def_paren_empty        = force
sp_func_proto_paren            = force
sp_func_proto_paren_empty      = force
sp_func_class_paren            = force
sp_inside_braces               = force
sp_inside_braces_empty         = remove
sp_before_class_colon          = force
sp_after_class_colon           = force
sp_after_new                   = force
sp_not                         = remove
sp_member                      = remove
sp_before_square               = remove
sp_inside_square               = remove
sp_cond_question               = force
sp_cond_question_after         = force
sp_cond_colon                  = force
sp_cond_colon_before           = force
sp_angle_shift                 = remove
sp_permit_cpp11_shift          = true

# Braces stay on the declaration or control-flow line.
nl_enum_brace                  = remove
nl_struct_brace                = remove
nl_if_brace                    = remove
nl_for_brace                   = remove
nl_while_brace                 = remove
nl_switch_brace                = remove
nl_namespace_brace             = remove
nl_class_brace                 = remove
nl_brace_else                  = remove
nl_brace_catch                 = remove
nl_brace_finally               = remove
nl_else_brace                  = remove
nl_catch_brace                 = remove
nl_finally_brace               = remove
nl_try_brace                   = remove
nl_getset_brace                = remove
nl_fdef_brace                  = remove

# Keep at most one blank line and wrap ordinary code at 100 columns.
nl_max                         = 2
code_width                     = 100
